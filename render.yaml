services:
  - type: web
    name: groww-rag-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.api
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
